        name: "中文（中国"
      - locale: "zh-TW"
        name: "中文（台灣"
  timer:
    enabled: true
    time: 5
    music:
      enabled: false
      volume: 0.4
      track1: "RelaxingMusic"
      track2: "CalmMusic"
      track3: "aristocratDrums"
    maxHours: 23
    presets: [60, 300, 600, 900, 1200, 1800, 3600]
    quickAddButtons: [30, 60, 300]
    serverSyncTimeInterval: 300000
  chat:
    enabled: true
    itemsPerPage: 100
    enableSaveAndCopyPublicChat: true
    startClosed: false
    min_message_length: 1
    max_message_length: 5000
    type_system: SYSTEM_MESSAGE
    type_public: PUBLIC_ACCESS
    type_private: PRIVATE_ACCESS
    system_userid: SYSTEM_MESSAGE
    system_username: SYSTEM_MESSAGE
    public_id: public
    public_group_id: MAIN-PUBLIC-GROUP-CHAT
    public_userid: public_chat_userid
    public_username: public_chat_username
    storage_key: UNREAD_CHATS
    system_messages_keys:
      chat_clear: PUBLIC_CHAT_CLEAR
      chat_poll_result: PUBLIC_CHAT_POLL_RESULT
      chat_exported_presentation: PUBLIC_CHAT_EXPORTED_PRESENTATION
      chat_status_message: PUBLIC_CHAT_STATUS
    typingIndicator:
      enabled: true
      showNames: true
    moderatorChatEmphasized: true
    privateMessageReadFeedback:
      enabled: false
    autoConvertEmoji: true
    emojiPicker:
      enable: false
    # e.g.: disableEmojis: ['grin','laughing']
    # use the id of the emojis from https://raw.githubusercontent.com/missive/emoji-mart/16978d04a766eec6455e2e8bb21cd8dc0b3c7436/packages/emoji-mart-data/sets/1/all.json
    disableEmojis: []
    markdownImageAllowed: false
    # available options for toolbar: reply, edit, delete, reactions, pin
    # example: ['reply', 'delete']
    toolbar: ['reply', 'delete', 'edit', 'reactions', 'pin']
    announcePresenterChangeInChat: true
  multiFunctionalMode:
    enabled: false # Enables an auxiliary sidebar content panel in the UI.
  userReaction:
    enabled: true
    expire: 30
    reactions:
      - id: 'smiley'
        native: '😃'
      - id: 'neutral_face'
        native: '😐'
      - id: 'slightly_frowning_face'
        native: '🙁'
      - id: '-1'
        native: '👎'
      - id: '+1'
        native: '👍'
      - id: 'clap'
        native: '👏'
  notes:
    enabled: true
    id: notes
    pinnable: true
  layout:
    hidePresentationOnJoin: false
    showParticipantsOnLogin: false
    showSessionDetailsOnJoin: true
    showScreenshareQuickSwapButton: false
    showLeaveSessionLabel: false
    usersPerUserListPage: 50
    syncCameraDockSizeAndPosition: true
  sidebarNavigation:
    # Controls which apps should have the "new" label in the apps gallery.
    # Possible values: 'poll', 'breakoutroom', 'timer', 'audio-captions'.
    # For plugins, refer to the isNew flag in the plugin's own settings.
    appsToLabelAsNew: []
  pads:
    url: ETHERPAD_HOST
  sharedNotes:
    # Hocuspocus server hostname for BlockNote (it will use the client's hostname when empty)
    # e.g: `bbb-host` (only the domain without protocol and path)
    serverHostname:
    maxDocumentChars: 99999
    maxLengthForContentUpdate: 1500
    # When enabled, the formatting toolbar is rendered statically above the
    # editor and always visible. When disabled, BlockNote's default floating
    # toolbar appears only when text is selected.
    staticFormattingToolbar: true
  media:
    audio:
      # defaultFullAudioBridge: bridge to be used by full audio mechanism.
      # Deprecated, superseded by `audioBridge` (bigbluebutton.properties, /create)
      defaultFullAudioBridge: fullaudio
      # fullAudioMediaServer: which bbb-webrtc-sfu media server adapter should
      # be used for microphone audio.
      # Default is undefined, which means the default setting in bbb-webrtc-sfu
      # prevails (fullAudioMediaServer).
      #fullAudioMediaServer: mediasoup
      #
      # defaultListenOnlyBridge: bridge to be used by listen only mechanism.
      # Deprecated, no alternative as this audio mode will be removed.
      defaultListenOnlyBridge: fullaudio
      # retryThroughRelay: forces a retry with iceTransportPolicy = 'relay'
      # if the first attempt fails with selected errors codes (eg 1007, 1010)
      retryThroughRelay: false
      # allowAudioJoinCancel: allow users to cancel audio join requests by
      # by closing the audio modal while audio is being negotiated.
      # If false, the audio modal will be locked until the process finishes.
      allowAudioJoinCancel: true
      # audioWasmProcessing: audio input processing through WASM/BBBA
      #   enabled: whether BBBA should be exposed to users. If false, browser's
      #            built-in audio processing will be used instead.
      #   constraints: browser-level audio constraints applied ON TOP of WASM processing.
      audioWasmProcessing:
        enabled: false
        constraints:
          echoCancellation: true
          autoGainControl: true
          noiseSuppression: true
    stunTurnServersFetchAddress: '/bigbluebutton/api/stuns'
    cacheStunTurnServers: true
    fallbackStunServer: ''
    # Forces relay usage on all browsers, environments and media modules.
    # If true, supersedes public.kurento.forceRelayOnFirefox
    forceRelay: false
    # Firefox has a buggy ICE implementation. With mediasoup this leads to
    # connection problems unless all traffic is relayed through a turn server.
    forceRelayOnFirefox: true
    mediaTag: '#remote-media'
    callTransferTimeout: 5000
    callHangupTimeout: 2000
    callHangupMaximumRetries: 10
    echoTestNumber: 'echo'
    listenOnlyCallTimeout: 15000
    # skipInitialCamEnumeration: whether to skip the initial camera enumeration
    # See https://github.com/bigbluebutton/bigbluebutton/issues/21746
    skipInitialCamEnumeration: false
    # transparentListenOnly: whether the client should use the transparent
    # listen only mechanism.
    # It does not remove the "Listen Only" option from the audio modal
    # by itself, but it allows users to switch modes on the fly and
    # improves server CPU efficiency for microphone users.
    # To disable the dedicated listen only option in the audio modal,
    # see `listenOnlyMode`/`userdata-bbb_transparent_listen_only_mode`
    # userdata-bbb_transparent_listen_only supersedes this setting
    transparentListenOnly: true
    # Dev flag. Controls the WebRTC SDP negotiation role for SFU full audio.
    fullAudioOffering: true
    # Dev flag. Controls the WebRTC negotiation role for listen only.
    listenOnlyOffering: false
    #Timeout (ms) for gathering ICE candidates. When this timeout expires
    #the SDP is sent to the server with the candidates the browser gathered
    #so far. Increasing this value might help avoiding 1004 error when
    #user activates microphone.
    iceGatheringTimeout: 5000
    # Timeout (ms) for connecting to the audio's signaling websocket.
    audioConnectionTimeout: 5000
    # Delay (ms) between each reconnection attempt of the audio's signaling
    # websocket.
    audioReconnectionDelay: 5000
    # Number of reconnection attempts of the signaling websocket, before
    # showing to the user there's an audio error.
    audioReconnectionAttempts: 3
    sipjsHackViaWs: false
    # sipjsAllowMdns: whether mDNS candidates should be allowed in local SDPs.
    # Default is false since FreeSWITCH doesn't resolve mDNS by default.
    sipjsAllowMdns: false
    # the fqdn of this host.
    # If you run a traditional setup of multiple nodes behind scalelite and the users see the hostnames of the
    # individual nodes, you can leave this at the default setting
    sip_ws_host: ''
    # Mute/umute toggle throttle time
    toggleMuteThrottleTime: 300
    #Websocket keepAlive interval (seconds). You may set this to prevent
    #websocket disconnection in some environments. When set, BBB will send
    #'\r\n\r\n' string through SIP.js's websocket. If not set, default value
    #is 0.
    websocketKeepAliveInterval: 30
    #Debounce time (seconds) for sending SIP.js's websocket keep alive message.
    #If not set, default value is 10.
    websocketKeepAliveDebounce: 10
    #Trace sip/audio messages in browser. If not set, default value is false.
    traceSip: false
    # SDP semantics: plan-b|unified-plan
    sdpSemantics: 'unified-plan'
    # localEchoTest:
    #   enabled: Boolean => enables an experimental, simplified echo test mode
    #   initialHearingState: Boolean => whether users should hear themselves firsthand
    #   useRtcLoopbackInChromium: Boolean => whether a local RTC loopback should
    #   be used in Chromium browsers. Works around the fact that Chromium has no
    #   echo cancellation in non-rtc audio streams
    localEchoTest:
      enabled: true
      initialHearingState: true
      useRtcLoopbackInChromium: true
      # delay: delay (seconds) to be added to the audio feedback return
      delay:
        enabled: true
        delayTime: 0.5
        maxDelayTime: 2
    # networkPriorities: DSCP markings for each media type. Chromium only, applies
    # to sender flows. See https://datatracker.ietf.org/doc/html/rfc8837#section-5
    # for further info.
    #networkPriorities:
    #  audio: high
    #  webcam: medium
    #  screenshare: medium
    #
    # audioTroubleshootingLinks: links to help users troubleshoot audio issues
    # If no link is provided, the audio troubleshooting button will not be shown.
    # Index is the error code:
    #   - 7: permission denied error code
    #   - 6: no input devices found
    #   - 0: unknown error
    #audioTroubleshootingLinks:
    #  7: 'https://link.bigbluebutton.org/perm'
    #  0: 'https://link.bigbluebutton.org/unk'
    # muteAudioOutputWhenAway: mute output audio if user is in away mode
    muteAudioOutputWhenAway: false
    # Index is the error code:
    #   - 1136: permission denied
    screenshareTroubleshootingLinks:
      1136: 'https://support.bigbluebutton.org/hc/en-us/articles/1500005316582-Share-my-screen#:~:text=Error%201136%3A%20Permission%20to%20capture,able%20to%20screen%20share%20again'
    livekit:
      # livekit.url is the URL of the LiveKit server. Default value is 'wss://{window.location.hostname}/livekit'
      #url: wss://LIVEKIT_HOST/livekit
      # livekit.selectiveSubscription: whether to use selective subscription for all
      # applicable track sources. This overrides autoSubscribe.
      selectiveSubscription:
        enabled: true
        # audioSubscriptionPoolSize: maximum number of simultaneously subscribed
        # audio tracks. 0 means unlimited. Exemptions that may exceed the pool:
        # screen audio, unmuted users.
        audioSubscriptionPoolSize: 0
        # muteDebounceMs: debounce time in milliseconds for mute state
        # transitions that would trigger unsubscribe operations.
        muteDebounceMs: 2500
      logLevel: 3
      # reconnectOnFatalFailures: whether to trigger LK room reconnections when
      # fatal errors occur (e.g.: unrecoverable publish timeouts).
      reconnectOnFatalFailures: true
      roomOptions:
        adaptiveStream: true
        dynacast: true
        stopLocalTrackOnUnpublish: false
        singlePeerConnection: false
      audio:
        # unpublishOnMute: whether to unpublish audio tracks when muted. Default is true.
        unpublishOnMute: true
        # useLiveKitAudioState: whether to use LiveKit's client-side audio state
        # instead of BBB's audio state. Default is false.
        useLiveKitAudioState: false
        # publishOptions: see https://docs.livekit.io/client-sdk-js/interfaces/TrackPublishOptions.html
        publishOptions:
          audioPreset:
            maxBitrate: 48000
            networkPriority: 'high'
            priority: 'high'
          dtx: false
          red: true
          forceStereo: false
      camera:
        publishOptions:
          videoCodec: 'vp8'
        # presets: optional explicit simulcast presets. When specified,
        # overrides automatic profile-to-layer mapping from cameraProfiles.
        # Ordered lowest to highest quality.
        # Array of VideoPreset objects (see https://docs.livekit.io/reference/client-sdk-js/variables/VideoPresets.html).
        #presets: []
      screenshare:
        publishOptions:
          videoCodec: 'vp8'
        # constraints: independent from kurento.screenshare.constraints
        constraints:
          video:
            frameRate:
              ideal: 15
              max: 15
            width:
              max: 2560
            height:
              max: 1600
          audio: true
        # livekit.screenshare.presets: ordered lowest to highest quality.
        # Entries are VideoPreset objects (see https://docs.livekit.io/reference/client-sdk-js/variables/VideoPresets.html).
        # Presets may be partially specified - missing bitrate/FPS entries will
        # be interpolated by the client. Resolution defaults to capture resolution.
        presets:
          - maxBitrate: 500000
            maxFramerate: 5
            priority: medium
          - maxBitrate: 1500000
            maxFramerate: 15
            priority: medium
  stats:
    enabled: true
    interval: 10000
    timeout: 10000
    probes: 5
    # Client-side WebRTC stats logging. If enabled, the client will log periodic
    # WebRTC stats information to the configured logging transports.
    # Disabled by default. This log is verbose and may incur in additional network
    # usage if external logging targets are configured.
    # The effective stats logging frequency is determined by the ratio of
    # stats.interval to stats.probes (interval / probes).
    logMediaStats:
      enabled: false
      # additionalStatsTypes: Defines additional WebRTC stats to extract from getStats(),
      # beyond the default ones.
      # Applied only when logMediaStats.enabled is true.
      #   - Values must be provided as arrays.
      #   - 'common' stats apply to all media types: audio, video, and screenshare.
      #   - Stats under 'audio', 'video', or 'screenshare' apply only to their respective media type.
      # Valid values: any type from https://developer.mozilla.org/en-US/docs/Web/API/RTCStatsReport#the_statistic_types
      additionalStatsTypes:
        common: []
        audio: []
        video: []
        screenshare: []
    notification:
      warning: false
      error: true
    loss:
      warning: 0.05
      danger: 0.1
      critical: 0.2
    rtt:
      warning: 500
      danger: 1000
      critical: 2000
    help: STATS_HELP_URL
  presentation:
    allowDownloadOriginal: true
    allowDownloadWithAnnotations: true
    allowSnapshotOfCurrentSlide: true
    panZoomThrottle: 32
    restoreOnUpdate: true
    uploadEndpoint: '/bigbluebutton/presentation/upload'
    fileUploadConstraintsHint: false
    # mirroredFromBBBCore are values controlled in bbb-web properties file. We include a copy here for notification purposes
    mirroredFromBBBCore:
      uploadSizeMax: 30000000
      uploadPagesMax: 200
    # If the following mime-types list is changed, please, make sure to also change:
    # bbb-common-web/src/main/java/org/bigbluebutton/presentation/MimeTypeUtils.java: L34 (and related files.)
    # docs/docs/development/api.md: L1222
    uploadValidMimeTypes:
      - extension: .pdf
        mime: application/pdf
      - extension: .doc
        mime: application/msword
      - extension: .docx
        mime: application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - extension: .xls
        mime: application/vnd.ms-excel
      - extension: .xlsx
        mime: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - extension: .ppt
        mime: application/vnd.ms-powerpoint
      - extension: .pptx
        mime: application/vnd.openxmlformats-officedocument.presentationml.presentation
      - extension: .txt
        mime: text/plain
      - extension: .rtf
        mime: application/rtf
      - extension: .odt
        mime: application/vnd.oasis.opendocument.text
      - extension: .ods
        mime: application/vnd.oasis.opendocument.spreadsheet
      - extension: .odp
        mime: application/vnd.oasis.opendocument.presentation
      - extension: .odg
        mime: application/vnd.oasis.opendocument.graphics
      - extension: .jpg
        mime: image/jpeg
      - extension: .jpeg
        mime: image/jpeg
      - extension: .png
        mime: image/png
      - extension: .webp
        mime: image/webp
  user:
    role_moderator: MODERATOR
    role_viewer: VIEWER
    label:
      presenter: true
      moderator: true
      mobile: true
      guest: true
      sharingWebcam: true
      bot: true
  userList:
    searchBar:
      enabled: true
  whiteboard:
    annotationsQueueProcessInterval: 60
    cursorInterval: 100
    allowInfiniteWhiteboard: false
    allowInfiniteWhiteboardInBreakouts: false
    allowInfiniteWhiteboardPanForViewers: false
    pointerDiameter: 5
    maxStickyNoteLength: 1000
    # limit number of annotations per slide
    maxNumberOfAnnotations: 300
    # Limit the number of users who can interact with the whiteboard
    maxNumberOfActiveUsers: 25
    # This is the number of times we can press undo (plus 100 providing a safe margin for some shapes with extra entries)
    # default value is 400, adjusted for maxNumberOfAnnotations being 300
    maxHistoryStackSize: 400
    lockToolbarTools: false
    annotations:
      status:
        start: DRAW_START
        update: DRAW_UPDATE
        end: DRAW_END
    styles:
      # color is one of 'black', 'blue', 'green', 'grey', 'light-blue', 'light-green', 'light-red', 'light-violet', 'orange', 'red', 'violet', 'yellow'
      colorStyle: 'black'
      # dash is one of 'dashed', 'dotted', 'draw', 'solid'
      dashStyle: 'draw'
      # fill is one of 'none', 'pattern', 'semi', 'solid'
      fillStyle: 'none'
      # font is one of 'draw','mono','sans', 'serif'
      fontStyle: 'draw'
      # size is one of 'l', 'm', 's', 'xl'
      sizeStyle: 'm'

      # this one is obsoleted now
      text:
        # Initial font family.
        # family: mono|sans|script|serif
        family: script
    toolbar:
      multiUserPenOnly: false
      initialSelectedTool: draw
      presenterTools:
        - select
        - hand
        - draw
        - eraser
        - arrow
        - text
        - note
        - rectangle
        - delete-selected-items
        - highlight
        - more
        - actions
        - ellipse
        - diamond
        - triangle
        - trapezoid
        - rhombus
        - hexagon
        - cloud
        - star
        - oval
        - x-box
        - check-box
        - arrow-left
        - arrow-up
        - arrow-down
        - arrow-right
        - line
        - frame
      multiUserTools:
        - select
        - hand
        - draw
        - eraser
        - arrow
        - text
        - note
        - rectangle
        - delete-selected-items
        - highlight
        - more
        - actions
        - ellipse
        - diamond
        - triangle
        - trapezoid
        - rhombus
        - hexagon
        - cloud
        - star
        - oval
        - x-box
        - check-box
        - arrow-left
        - arrow-up
        - arrow-down
        - arrow-right
        - line
        - frame
    locales: ['ar', 'ca', 'cs', 'da', 'de', 'en', 'es', 'fa', 'fi', 'fr', 'gl', 'he', 'hi-in', 'hu', 'it', 'ja', 'ko-kr', 'ku', 'main', 'my', 'ne', 'no', 'pl', 'pt-br', 'pt-pt', 'ro', 'ru', 'sv', 'te', 'th', 'tr', 'uk', 'vi', 'zh-cn', 'zh-tw']
  clientLog:
