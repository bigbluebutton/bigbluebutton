table:
  name: v_meeting_chat
  schema: public
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: meeting_chat
  custom_root_fields: {}
select_permissions:
  - role: bbb_client
    permission:
      columns:
        - maxPinnedChatMessages
      filter:
        meetingId:
          _eq: X-Hasura-MeetingId
    comment: ""
  - role: bbb_client_not_in_meeting
    permission:
      columns:
        - maxPinnedChatMessages
      filter:
        meetingId:
          _eq: X-Hasura-MeetingId
    comment: ""