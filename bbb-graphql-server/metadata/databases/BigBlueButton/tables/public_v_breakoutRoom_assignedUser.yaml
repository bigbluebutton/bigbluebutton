table:
  name: v_breakoutRoom_assignedUser
  schema: public
configuration:
  column_config: {}
  custom_column_names: {}
  custom_name: breakoutRoom_assignedUser
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      manual_configuration:
        column_mapping:
          userId: userId
          userMeetingId: meetingId
        insertion_order: null
        remote_table:
          name: v_user_ref
          schema: public
select_permissions:
  - role: bbb_client
    permission:
      columns:
        - userId
        - isLastAssignedRoom
        - assignedAt
        - inviteDismissedAt
        - isLastJoinedRoom
        - hasJoined
        - joinedAt
        - isUserCurrentlyInRoom
      filter:
        _or:
          - meetingId:
              _eq: X-Hasura-ModeratorInMeeting
          - _and:
              - userMeetingId:
                  _eq: X-Hasura-MeetingId
              - userId:
                  _eq: X-Hasura-UserId
      allow_aggregations: true
      query_root_fields: []
      subscription_root_fields: []
