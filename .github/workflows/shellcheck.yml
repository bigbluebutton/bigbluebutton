name: Run ShellCheck
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
            fetch-depth: 1
      - uses: ludeeus/action-shellcheck@master   # runs ShellCheck on **/*.sh by default
        with:
            severity: error
