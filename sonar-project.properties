# SonarQube scanner config for BigBlueButton
# Docs: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/analysis-parameters/
#
# Glob patterns below are relative to sonar.projectBaseDir (defaults to this file's dir).
# Goal: keep billable LoC honest by excluding generated, vendored, bundled, and binary content
# while still letting Sonar find real bugs in tests.

sonar.projectKey=bigbluebutton
sonar.projectName=BigBlueButton
sonar.sourceEncoding=UTF-8

# Scan the whole tree; rely on exclusions to scope it. Easier to maintain than
# enumerating ~25 top-level modules and forgetting to add new ones.
sonar.sources=.

# Tests are analyzed (Sonar still flags bugs in them) but do NOT count toward
# the "lines of code" metric Sonar bills on.
sonar.tests=\
  bigbluebutton-tests,\
  akka-bbb-apps/src/test,\
  akka-bbb-fsesl/src/test,\
  bbb-common-message/src/test,\
  bbb-common-web/src/test,\
  bbb-fsesl-client/src/test,\
  bigbluebutton-web/src/test

# ---------------------------------------------------------------------------
# Global exclusions — nothing here is scanned at all
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/out/**,\
  **/target/**,\
  **/.gradle/**,\
  **/cache/**,\
  **/.git/**,\
  **/generated/**,\
  **/generated-sources/**,\
  **/__generated__/**,\
  **/vendor/**,\
  **/third_party/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/*.bundle.js,\
  **/*.map,\
  **/*.lock,\
  **/package-lock.json,\
  **/yarn.lock,\
  **/pnpm-lock.yaml,\
  **/go.sum,\
  **/*.svg,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg,\
  **/*.gif,\
  **/*.ico,\
  **/*.woff,\
  **/*.woff2,\
  **/*.ttf,\
  **/*.eot,\
  **/*.pdf,\
  **/*.mp3,\
  **/*.mp4,\
  **/*.webm,\
  bigbluebutton-html5/public/**,\
  bigbluebutton-html5/private/locales/**,\
  bbb-learning-dashboard/public/**,\
  bbb-graphql-server/metadata/**,\
  docs/**,\
  artifacts/**,\
  labs/**,\
  build/repo-server/**

# ---------------------------------------------------------------------------
# Coverage / duplication carve-outs (still scanned, just not held to these metrics)
# ---------------------------------------------------------------------------
sonar.coverage.exclusions=\
  **/*.test.*,\
  **/*.spec.*,\
  bigbluebutton-tests/**,\
  **/src/test/**,\
  **/src/it/**,\
  **/__tests__/**

sonar.cpd.exclusions=\
  **/generated/**,\
  **/*.pb.go,\
  **/schema.graphql,\
  bbb-graphql-server/migrations/**

# ---------------------------------------------------------------------------
# Per-language source paths (optional; helps the scanner classify files correctly)
# ---------------------------------------------------------------------------
# sonar.go.coverage.reportPaths=coverage.out
# sonar.typescript.tsconfigPaths=bigbluebutton-html5/tsconfig.json
