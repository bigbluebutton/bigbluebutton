---
services:
  web:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-web:${IMAGE_WEB_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-web:local"
    restart: unless-stopped
    depends_on:
      - redis
      - etherpad
      - pads
      - collabora
    healthcheck:
      test: curl -s -o /dev/null --spider http://10.7.7.2:8090/bigbluebutton/api || exit 1
      start_period: 2m
    volumes:
      - ./data/bigbluebutton:/var/bigbluebutton
      - ./data/freeswitch-meetings:/var/freeswitch/meetings
    networks:
      bbb-net:

  apps-akka:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-apps-akka:${IMAGE_APPS_AKKA_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-apps-akka:local"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data/freeswitch-meetings:/var/freeswitch/meetings
      - ./conf/bbb-html5.yml:/etc/bigbluebutton/bbb-html5.yml:ro
    networks:
      bbb-net:

  html5-client:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-html5-client:${IMAGE_HTML5_CLIENT_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-html5-client:local"
    networks:
      bbb-net:

  learning-dashboard:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-learning-dashboard:${IMAGE_LEARNING_DASHBOARD_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-learning-dashboard:local"
    networks:
      bbb-net:

  graphql-actions:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-actions:${IMAGE_GRAPHQL_ACTIONS_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-actions:local"
    restart: unless-stopped
    depends_on:
      - redis
      - apps-akka
    networks:
      bbb-net:

  graphql-middleware:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-middleware:${IMAGE_GRAPHQL_MIDDLEWARE_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-middleware:local"
    restart: unless-stopped
    depends_on:
      - graphql-server
      - graphql-actions
      - web
      - redis
    networks:
      bbb-net:

  graphql-server:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-server:${IMAGE_GRAPHQL_SERVER_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-graphql-server:local"
    restart: unless-stopped
    depends_on:
      - postgres
      - web
      - apps-akka
      - graphql-actions
    networks:
      bbb-net:

  export-annotations:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-export-annotations:${IMAGE_EXPORT_ANNOTATIONS_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-export-annotations:local"
    restart: unless-stopped
    depends_on:
      - redis
      - web
      - pads
    networks:
      bbb-net:
    volumes:
      - ./data/bigbluebutton:/var/bigbluebutton
    tmpfs:
      - /tmp

  pads:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-pads:${IMAGE_PADS_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      - redis
      - etherpad
    networks:
      bbb-net:

  etherpad:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-etherpad:${IMAGE_ETHERPAD_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-etherpad:local"
    restart: unless-stopped
    depends_on:
      - redis
      - collabora
    networks:
      bbb-net:

  record-and-playback:
    container_name: recording-workers
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-record-and-playback:${IMAGE_RECORD_AND_PLAYBACK_TAG:-latest}"
    command: "rasque_workers"
    depends_on:
      - redis
    build:
      args:
        TAG_BBB_PRESENTATION_VIDEO: "${TAG_BBB_PRESENTATION_VIDEO:-5.0.0}"
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-record-and-playback:local"

  recording-starter:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-record-and-playback:${IMAGE_RECORD_AND_PLAYBACK_TAG:-latest}"
    command: "rap_starter"

  recording-caption-inbox:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-record-and-playback:${IMAGE_RECORD_AND_PLAYBACK_TAG:-latest}"
    command: "rap_caption_inbox"

  recording-cleanup:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-record-and-playback:${IMAGE_RECORD_AND_PLAYBACK_TAG:-latest}"
    command: "cleanup"
    env_file:
      - .env

  webrtc-sfu:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-webrtc-sfu:${IMAGE_WEBRTC_SFU_TAG:-latest}"
    restart: unless-stopped
    environment:
      - LIVEKIT_ENABLED=true
      - LIVEKIT_HOST=http://livekit:7880
      - LIVEKIT_EVENT_SOURCE=agent
      - CLIENT_HOST=0.0.0.0
      - KURENTO=[]
      - LOG_LEVEL=info
      - MCS_ADDRESS=localhost
      - MCS_HOST=0.0.0.0
      - MCS_PORT=3009
      - REDIS_HOST=redis
    env_file:
      - .env
    networks:
      bbb-net:

  nginx:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-nginx:${IMAGE_NGINX_TAG:-latest}"
    build:
      tags:
        - "${IMAGE_REPO:-bigbluebutton}/bbb-nginx:local"
    depends_on:
      - web
      - etherpad
      - html5-client
      - bbb-webhooks
      - webrtc-sfu
      - graphql-server
      - graphql-middleware
      - livekit

  webhooks:
    image: "${IMAGE_REPO:-bigbluebutton}/bbb-webhooks:${IMAGE_WEBHOOKS_TAG:-latest}"
    depends_on:
      - redis

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      bbb-net:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_MULTIPLE_DATABASES: bbb_graphql,hasura_app,greenlight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/initdb.sh:/docker-entrypoint-initdb.d/initdb.sh
    networks:
      bbb-net:

  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    tmpfs:
      - /tmp
    networks:
      bbb-net:
    # disable logging (way to verbose)
    logging:
      driver: none

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          port_range_start: 16384
          port_range_end: 32768
          use_external_ip: false
          tcp_port: 0
          allow_tcp_fallback: false
          interfaces:
            excludes:
              - docker0
        redis:
          address: 'redis:6379'
        webhook:
          urls:
            - 'http://webrtc-sfu:3040/livekit-webhook'
        audio:
          active_level: 50
          min_percentile: 10
          update_interval: 500
          smooth_intervals: 0
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        room:
          enabled_codecs:
            - mime: audio/opus
            - mime: audio/red
            - mime: video/vp8
            - mime: video/rtx
          enable_remote_unmute: true
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      bbb-net:

  sip:
    image: livekit/sip:latest
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      SIP_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: 'ws://livekit:7880'
        redis:
          address: 'redis:6379'
        sip_port: 5062
        sip_port_listen: 5062
    env_file:
      - .env
    networks:
      bbb-net:

networks:
  bbb-net:
